<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MemoFlash v0.05</title>
    <style>
        :root {
            --bg-color: #f4f6f8;
            --panel-bg: #ffffff;
            --text-dark: #1f2328;
            --text-dim: #656d76;
            --blue-accent: #0969da;
            --border-color: #d0d7de;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0; padding: 15px;
            padding-top: max(15px, env(safe-area-inset-top)); 
            padding-bottom: max(15px, env(safe-area-inset-bottom));
            min-height: 100vh; width: 100vw; box-sizing: border-box;
            overflow-x: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .view-container {
            width: 100%; max-width: 400px; margin: 0 auto; 
            display: none; flex-direction: column; gap: 15px;
        }
        
        #capture-view { display: flex; }

        .header { text-align: center; }
        .header h1 { margin: 0; font-size: 26px; color: var(--blue-accent); font-weight: 900; letter-spacing: -0.5px;}

        .active-list-bar { background: #ddf4ff; border: 1px solid #54aeff; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; }
        .active-list-label { font-size: 10px; color: var(--blue-accent); text-transform: uppercase; font-weight: 900;}
        .active-list-name { font-size: 16px; font-weight: bold; color: var(--text-dark); margin-top: 2px;}

        textarea {
            width: 100%; padding: 15px; box-sizing: border-box;
            border: 2px solid var(--border-color); border-radius: 8px; font-size: 18px;
            resize: none; font-family: inherit;
        }
        
        #single-input { height: 100px; text-align: center; font-weight: bold;}
        #batch-input { font-size: 14px; white-space: pre-wrap; height: 300px;}

        button {
            border: none; border-radius: 8px; font-weight: bold; font-size: 14px;
            padding: 15px; cursor: pointer; text-transform: uppercase;
        }

        .btn-primary { background: var(--blue-accent); color: white; width: 100%; }
        .btn-secondary { background: #e8ecf1; color: var(--text-dark); border: 1px solid var(--border-color); width: 100%; }
        .btn-review { background: #2da44e; color: white; width: 100%; padding: 18px; font-size: 18px; margin-top: 10px; border-bottom: 4px solid #238636;}

        .or-divider { text-align: center; font-weight: 900; color: var(--border-color); font-size: 14px; margin: 5px 0;}

        /* LIBRARY */
        .library-list { display: flex; flex-direction: column; gap: 8px; }
        .lib-item { background: var(--panel-bg); border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; text-align: left; display: flex; justify-content: space-between; align-items: center;}
        .lib-title { font-size: 15px; font-weight: bold;}
        .lib-desc { font-size: 10px; color: var(--text-dim);}

        /* PLAYBACK */
        .card {
            background: var(--panel-bg); border: 2px solid var(--border-color); border-radius: 12px;
            min-height: 200px; display: flex; justify-content: center; align-items: center;
            padding: 20px; text-align: center; margin: 15px 0;
        }
        .card-term { font-size: 32px; font-weight: 900; }

        .settings-panel { background: #ffffff; border: 2px solid var(--border-color); border-radius: 12px; padding: 15px; font-size: 12px;}
        input[type=range] { width: 100%; accent-color: var(--blue-accent); }
    </style>
</head>
<body>

    <div id="capture-view" class="view-container">
        <div class="header"><h1>MemoFlash v0.05</h1></div>

        <div class="active-list-bar" onclick="renameCurrentList()">
            <div class="active-list-label">Current Study List:</div>
            <div id="active-list-title-display" class="active-list-name">Quick Captures</div>
        </div>

        <textarea id="single-input" placeholder="Paste phrase or word..."></textarea>
        <button class="btn-primary" onclick="saveSingleMemo()">➕ ADD TO LIST</button>
        
        <div class="or-divider">OR</div>
        <button class="btn-secondary" onclick="showView('batch-view')">📝 PASTE LARGE LIST</button>
        <button class="btn-secondary" onclick="showView('library-view')" style="margin-top:10px;">📚 SAVED LISTS</button>

        <button class="btn-review" id="start-btn" onclick="startReviewMode()">▶ PLAY AUDIO CARDS (0)</button>
    </div>

    <div id="library-view" class="view-container">
        <div class="header"><h1>My Library</h1></div>
        <div id="user-lists-container" class="library-list"></div>
        <button class="btn-secondary" onclick="createNewList()">＋ NEW EMPTY LIST</button>
        <button class="btn-secondary" onclick="showView('capture-view')">← BACK</button>
    </div>

    <div id="batch-view" class="view-container">
        <div class="header"><h1>Batch Editor</h1></div>
        <textarea id="batch-input" placeholder="Paste your list here... one item per line."></textarea>
        <button class="btn-primary" onclick="saveBatch()">💾 SAVE LIST</button>
        <button class="btn-secondary" onclick="showView('capture-view')">← CANCEL</button>
    </div>

    <div id="playback-view" class="view-container">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button class="btn-secondary" onclick="exitReviewMode()" style="width:auto;">EXIT</button>
            <div id="timer-text" style="font-weight:900; color:var(--blue-accent); font-size:20px;">3s</div>
        </div>
        <div class="card"><div id="card-term-text" class="card-term">...</div></div>
        <div style="display:flex; gap:10px;">
            <button class="btn-secondary" style="flex:1" onclick="rewindCard()">⏮</button>
            <button id="play-pause-btn" class="btn-primary" style="flex:2" onclick="togglePlayPause()">⏸ PAUSE</button>
            <button class="btn-secondary" style="flex:1" onclick="skipCard()">⏭</button>
        </div>
        <div class="settings-panel">
            <button id="voice-btn" class="btn-secondary" onclick="toggleVoice()" style="margin-bottom:10px;">🔊 VOICE: ON</button>
            <div>Voice Speed: <span id="speed-val">1x</span></div>
            <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateSpeed(this.value)">
            <div style="margin-top:10px;">Card Tempo: <span id="tempo-val">3s</span></div>
            <input type="range" id="tempo-slider" min="1" max="15" value="3" oninput="updateTempo(this.value)">
        </div>
    </div>

<script>
    let app = JSON.parse(localStorage.getItem('memoFlashV5')) || {
        activeId: 'default',
        lists: { 'default': { name: "Quick Captures", items: [], created: new Date().toLocaleString() } },
        voice: true,
        speed: 1.0,
        tempo: 3
    };

    let deck = [], history = [], hIndex = -1, timer = null, isPaused = false, countdown = app.tempo;

    window.onload = () => {
        updateUI();
        document.getElementById('speed-slider').value = app.speed;
        document.getElementById('tempo-slider').value = app.tempo;
        document.getElementById('speed-val').innerText = app.speed + 'x';
        document.getElementById('tempo-val').innerText = app.tempo + 's';
        updateVoiceBtn();
    };

    function save() {
        localStorage.setItem('memoFlashV5', JSON.stringify(app));
        updateUI();
    }

    function updateUI() {
        const active = app.lists[app.activeId];
        document.getElementById('active-list-title-display').innerText = active.name;
        document.getElementById('start-btn').innerText = `▶ PLAY AUDIO CARDS (${active.items.length})`;
    }

    function showView(id) {
        document.querySelectorAll('.view-container').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
        if (id === 'batch-view') document.getElementById('batch-input').value = app.lists[app.activeId].items.join('\n');
        if (id === 'library-view') renderLib();
    }

    function saveSingleMemo() {
        const val = document.getElementById('single-input').value.trim();
        if (val) {
            app.lists[app.activeId].items.push(val);
            save();
            document.getElementById('single-input').value = '';
        }
    }

    function saveBatch() {
        const lines = document.getElementById('batch-input').value.split('\n').map(l => l.trim()).filter(l => l);
        app.lists[app.activeId].items = lines;
        save();
        showView('capture-view');
    }

    function createNewList() {
        const name = prompt("List Name:");
        if (name) {
            const id = 'L' + Date.now();
            app.lists[id] = { name: name, items: [], created: new Date().toLocaleString() };
            app.activeId = id;
            save();
            showView('capture-view');
        }
    }

    function renderLib() {
        const container = document.getElementById('user-lists-container');
        container.innerHTML = '';
        Object.keys(app.lists).forEach(id => {
            const item = app.lists[id];
            const b = document.createElement('div');
            b.className = 'lib-item';
            b.innerHTML = `<div><div class="lib-title">${item.name}</div><div class="lib-desc">${item.items.length} items • ${item.created}</div></div>`;
            b.onclick = () => { app.activeId = id; save(); showView('capture-view'); };
            container.appendChild(b);
        });
    }

    function renameCurrentList() {
        const n = prompt("Rename List:", app.lists[app.activeId].name);
        if (n) { app.lists[app.activeId].name = n; save(); }
    }

    /* ENGINE */
    function startReviewMode() {
        if (!app.lists[app.activeId].items.length) return;
        showView('playback-view');
        deck = [...app.lists[app.activeId].items].sort(() => Math.random() - 0.5);
        history = []; hIndex = -1; isPaused = false;
        next();
        tick();
    }

    function tick() {
        clearInterval(timer);
        timer = setInterval(() => {
            if (isPaused || (app.voice && window.speechSynthesis.speaking)) return;
            countdown--;
            document.getElementById('timer-text').innerText = countdown + 's';
            if (countdown <= 0) next();
        }, 1000);
    }

    function next() {
        if (hIndex < history.length - 1) {
            hIndex++;
        } else {
            if (deck.length === 0) deck = [...app.lists[app.activeId].items].sort(() => Math.random() - 0.5);
            history.push(deck.pop());
            hIndex = history.length - 1;
        }
        renderCard();
    }

    function renderCard() {
        const txt = history[hIndex];
        document.getElementById('card-term-text').innerText = txt;
        if (app.voice) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(txt);
            u.rate = app.speed;
            window.speechSynthesis.speak(u);
        }
        countdown = app.tempo;
        document.getElementById('timer-text').innerText = countdown + 's';
    }

    function rewindCard() { if (hIndex > 0) { hIndex--; renderCard(); } }
    function skipCard() { next(); }
    function togglePlayPause() { isPaused = !isPaused; document.getElementById('play-pause-btn').innerText = isPaused ? "▶ PLAY" : "⏸ PAUSE"; }
    function toggleVoice() { app.voice = !app.voice; save(); updateVoiceBtn(); }
    function updateVoiceBtn() { document.getElementById('voice-btn').innerText = app.voice ? "🔊 VOICE: ON" : "🔇 VOICE: OFF"; }
    function updateSpeed(v) { app.speed = parseFloat(v); save(); document.getElementById('speed-val').innerText = v + 'x'; }
    function updateTempo(s) { app.tempo = parseInt(s); save(); document.getElementById('tempo-val').innerText = s + 's'; }
    function exitReviewMode() { clearInterval(timer); window.speechSynthesis.cancel(); showView('capture-view'); }
</script>
</body>
</html>
